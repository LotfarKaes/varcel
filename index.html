<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel Test - Working!</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .status { font-size: 24px; margin: 20px 0; }
    .emoji { font-size: 48px; }
    button { 
      padding: 12px 24px; 
      font-size: 16px; 
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="emoji">🚀</div>
  <h1 class="status">Vercel Deployment SUCCESS!</h1>
  <p>Your 404 issue is fixed. This page proves:</p>
  <ul style="text-align: left; display: inline-block;">
    <li>✅ Build works</li>
    <li>✅ Framework detection correct</li>
    <li>✅ Root route "/" serves content</li>
    <li>✅ Static file serving works</li>
  </ul>
  
  <p><strong>Deploy timestamp:</strong> <span id="timestamp"></span></p>
  
  <button onclick="testAPI()">Test Fetch</button>
  <button onclick="testLocal()">Test Local Storage</button>
  
  <div id="result"></div>

  <script>
    document.getElementById('timestamp').textContent = new Date().toLocaleString();
    
    async function testAPI() {
      try {
        const res = await fetch('https://jsonplaceholder.typicode.com/todos/1');
        const data = await res.json();
        document.getElementById('result').innerHTML = 
          `<p style="color: #4ade80; font-weight: bold;">✅ API fetch works!</p>
           <pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch(e) {
        document.getElementById('result').innerHTML = `<p style="color: #ef4444;">❌ API failed</p>`;
      }
    }
    
    function testLocal() {
      localStorage.setItem('vercel-test', 'works!');
      const value = localStorage.getItem('vercel-test');
      document.getElementById('result').innerHTML = 
        value === 'works!' 
          ? '<p style="color: #4ade80; font-weight: bold;">✅ LocalStorage works!</p>'
          : '<p style="color: #ef4444;">❌ LocalStorage failed</p>';
    }
  </script>
</body>
</html>
